version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: decision_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: decisionpass123
      MONGO_INITDB_DATABASE: decisiondb
    volumes:
      - mongodb_data:/data/db
    networks:
      - decision_network

  backend:
    build: ./backend
    container_name: decision_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://admin:decisionpass123@mongodb:27017/decisiondb?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-super_secret_key_change_in_production_12345}
      EMAIL_HOST: smtp.gmail.com
      EMAIL_USER: ${EMAIL_USER:-demo@decisionfriend.com}
      EMAIL_PASS: ${EMAIL_PASS:-demo_pass}
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 30
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - decision_network

  frontend:
    build: ./frontend
    container_name: decision_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - decision_network

networks:
  decision_network:
    driver: bridge

volumes:
  mongodb_data:
